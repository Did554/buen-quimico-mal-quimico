<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Laboratorio Químico: ¿Peligroso o Seguro?</title>
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-safe: #10b981;
                --accent-danger: #ef4444;
                --border-color: #334155;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .container {
                max-width: 600px;
                width: 100%;
                background: var(--card-bg);
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                border: 1px solid var(--border-color);
            }

            h1 {
                font-size: 1.8rem;
                text-align: center;
                margin-top: 0;
                color: var(--text-main);
                border-bottom: 2px solid var(--border-color);
                padding-bottom: 15px;
                text-transform: capitalize;
            }

            .score-board {
                text-align: right;
                font-weight: bold;
                color: var(--accent-safe);
                margin-bottom: 20px;
            }

            .clues-section {
                background: rgba(15, 23, 42, 0.6);
                padding: 20px;
                border-radius: 8px;
                border-left: 4px solid var(--text-muted);
                margin-bottom: 25px;
            }

            .element-clue {
                margin-bottom: 15px;
            }

            .element-clue:last-child {
                margin-bottom: 0;
            }

            .element-title {
                font-weight: bold;
                color: #38bdf8;
                margin-bottom: 5px;
            }

            .actions {
                display: flex;
                gap: 15px;
                margin-bottom: 20px;
            }

            button {
                flex: 1;
                padding: 12px 20px;
                font-size: 1rem;
                font-weight: bold;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition:
                    transform 0.1s,
                    opacity 0.2s;
            }

            button:active {
                transform: scale(0.98);
            }

            .btn-safe {
                background-color: var(--accent-safe);
                color: white;
            }

            .btn-danger {
                background-color: var(--accent-danger);
                color: white;
            }

            .btn-next {
                background-color: #64748b;
                color: white;
                width: 100%;
                display: none;
            }

            .result-panel {
                display: none;
                padding: 20px;
                border-radius: 8px;
                margin-top: 20px;
                animation: fadeIn 0.3s ease-in-out;
            }

            .result-success {
                background: rgba(16, 185, 129, 0.15);
                border: 1px solid var(--accent-safe);
            }

            .result-fail {
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid var(--accent-danger);
            }

            .chemical-identity {
                font-size: 1.3rem;
                font-weight: bold;
                margin-bottom: 10px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>buen quimico o mal quimico</h1>
            <div class="score-board">Puntuación: <span id="score">0</span></div>

            <div id="game-zone">
                <div class="clues-section">
                    <h3>Pistas de los Elementos Componentes:</h3>
                    <div id="clues-container"></div>
                </div>

                <div class="actions" id="action-buttons">
                    <button class="btn-safe" onclick="checkAnswer(false)">
                        Es SEGURA
                    </button>
                    <button class="btn-danger" onclick="checkAnswer(true)">
                        Es PELIGROSA
                    </button>
                </div>

                <div id="result-panel" class="result-panel">
                    <div
                        id="feedback-text"
                        style="font-weight: bold; margin-bottom: 10px"
                    ></div>
                    <div class="chemical-identity" id="chemical-name"></div>
                    <p id="chemical-explanation"></p>
                    <button
                        class="btn-next"
                        id="btn-next"
                        onclick="nextSubstance()"
                    >
                        Siguiente Sustancia
                    </button>
                </div>
            </div>
        </div>

        <script>
            const substances = [
                {
                    isDangerous: false,
                    name: "Agua",
                    formula: "H₂O",
                    elements: [
                        {
                            name: "Elemento 1",
                            desc: "Un gas extremadamente inflamable y ligero. Se utiliza como combustible de cohetes y explota con facilidad en presencia de oxígeno.",
                        },
                        {
                            name: "Elemento 2",
                            desc: "Un gas altamente comburente (que alimenta y aviva las llamas). Es indispensable para las combustiones y los incendios.",
                        },
                    ],
                    explanation:
                        "¡Sorpresa! Al combinarse químicamente, el gas explosivo (Hidrógeno) y el gas que alimenta el fuego (Oxígeno) forman el **Agua**, la sustancia líquida e inofensiva que utilizamos precisamente para apagar el fuego.",
                },
                {
                    isDangerous: false,
                    name: "Cloruro de Sodio (Sal de mesa)",
                    formula: "NaCl",
                    elements: [
                        {
                            name: "Elemento 1",
                            desc: "Un metal blando y brillante que reacciona de forma violenta y explosiva al entrar en contacto directo con el agua líquida.",
                        },
                        {
                            name: "Elemento 2",
                            desc: "Un gas de color verde amarillento altamente tóxico, reactivo y asfixiante, utilizado en el pasado como arma química.",
                        },
                    ],
                    explanation:
                        "¡Fascinante! Un metal que explota con el agua (Sodio) y un gas venenoso (Cloro) se enlazan para crear la **Sal de mesa común**. Demuestra perfectamente que las propiedades de un compuesto son totalmente diferentes a las de sus elementos puros.",
                },
                {
                    isDangerous: true,
                    name: "Nitroglicerina",
                    formula: "C₃H₅N₃O₉",
                    elements: [
                        {
                            name: "Elemento 1",
                            desc: "No metal negro que crea unas de las uniones más fuertes del planeta.",
                        },
                        {
                            name: "Elemento 2",
                            desc: "Un gas extremadamente inflamable y ligero que explota fácilmente en presencia de oxígeno.",
                        },
                        {
                            name: "Elemento 3",
                            desc: "Un gas difícil de hacer reaccionar, inodoro, incoloro y que compone gran parte de la atmósfera.",
                        },
                        {
                            name: "Elemento 4",
                            desc: "Un gas altamente comburente (que alimenta y aviva las llamas). Es indispensable para las combustiones y los incendios.",
                        },
                    ],
                    explanation:
                        "Un compuesto altamente explosivo e inestable el cual, aparte de ser usado en bombas, también puede usarse en el ámbito médico para tratar ciertas condiciones del corazón. Sin embargo, se ha cobrado la vida de muchas personas debido a sus aplicaciones bélicas.",
                },
            ];

            let currentIndex = 0;
            let score = 0;

            function loadSubstance() {
                if (currentIndex >= substances.length) {
                    document.getElementById("game-zone").innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h2>¡Prueba Terminada!</h2>
                    <p style="font-size: 1.2rem;">Analizaste todas las sustancias disponibles.</p>
                    <p style="font-size: 1.5rem; color: var(--accent-safe); font-weight: bold;">Puntuación Final: ${score}/${substances.length}</p>
                    <button class="btn-safe" style="margin-top: 15px;" onclick="restartGame()">Volver a jugar</button>
                </div>
            `;
                    return;
                }

                const substance = substances[currentIndex];
                const container = document.getElementById("clues-container");
                container.innerHTML = "";

                substance.elements.forEach((el) => {
                    const div = document.createElement("div");
                    div.className = "element-clue";
                    div.innerHTML = `<div class="element-title">${el.name}</div><div>${el.desc}</div>`;
                    container.appendChild(div);
                });

                document.getElementById("result-panel").style.display = "none";
                document.getElementById("btn-next").style.display = "none";
                toggleButtons(true);
            }

            function checkAnswer(userGuessedDangerous) {
                toggleButtons(false);
                const substance = substances[currentIndex];
                const isCorrect =
                    userGuessedDangerous === substance.isDangerous;

                if (isCorrect) score++;
                document.getElementById("score").innerText = score;

                const resultPanel = document.getElementById("result-panel");
                const feedbackText = document.getElementById("feedback-text");

                resultPanel.className = `result-panel ${isCorrect ? "result-success" : "result-fail"}`;
                feedbackText.innerText = isCorrect
                    ? "¡CORRECTO! Supiste ver más allá de los elementos."
                    : "¡INCORRECTO! Te dejaste engañar por los elementos puros.";
                feedbackText.style.color = isCorrect
                    ? "var(--accent-safe)"
                    : "var(--accent-danger)";

                document.getElementById("chemical-name").innerText =
                    `${substance.name} (${substance.formula})`;
                document.getElementById("chemical-explanation").innerHTML =
                    substance.explanation;

                resultPanel.style.display = "block";
                document.getElementById("btn-next").style.display = "block";
            }

            function toggleButtons(enabled) {
                const buttons = document.querySelectorAll(
                    "#action-buttons button",
                );
                buttons.forEach((btn) => (btn.disabled = !enabled));
            }

            function nextSubstance() {
                currentIndex++;
                loadSubstance();
            }

            function restartGame() {
                currentIndex = 0;
                score = 0;
                location.reload();
            }

            // Inicializar el primer nivel al cargar la página
            loadSubstance();
        </script>
    </body>
</html>
